name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

      - name: Restructure for new site layout
        run: |
          # Move SPA index.html to /solo-practice/, keep assets at root
          mkdir -p dist/solo-practice
          mv dist/index.html dist/solo-practice/index.html

          # Copy static hub and detail pages
          cp docs/index.html dist/index.html
          cp docs/favicon.svg dist/favicon.svg
          cp docs/styles.css dist/styles.css
          cp docs/about.html dist/about.html
          cp docs/solo-practice.html dist/solo-practice.html
          cp docs/classrooms.html dist/classrooms.html
          cp docs/club-game-analysis.html dist/club-game-analysis.html
          cp docs/bbo-scenarios.html dist/bbo-scenarios.html
          cp docs/lesson-materials.html dist/lesson-materials.html
          cp docs/teacher-utilities.html dist/teacher-utilities.html
          cp docs/hand-curator.html dist/hand-curator.html
          cp docs/deal-library.html dist/deal-library.html
          cp -r docs/curator dist/curator
          cp -r docs/screenshots dist/screenshots

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
