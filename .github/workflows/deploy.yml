name: Deploy site (.com Pages + .org Worker)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Mapped to an env var so the deploy step can be conditioned on the
      # secret's presence (secrets can't be referenced directly in `if:`).
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: npm run build

      - name: Restructure for new site layout
        run: bash scripts/build-site.sh

      # Deploy the Cloudflare Worker (.org) from this same run, using the dist/
      # built above. This makes one build the single source of truth for BOTH
      # domains and inherits the workflow's `cancel-in-progress` concurrency, so
      # rapid successive merges always converge on the newest commit — fixing the
      # class of bug where Cloudflare's own git builder skipped a build (leaving
      # .org drifted behind .com). Disable the dashboard Git auto-build so this
      # is the only path that deploys the Worker.
      #
      # Self-gating: no-op until CLOUDFLARE_API_TOKEN is set, so this can be
      # merged before the secret exists without breaking the .com Pages deploy.
      - name: Deploy Worker (.org)
        if: env.CF_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
