<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bidding Practice - Bridge Classroom</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f7f7f5;
    color: #222;
    font-size: 14px;
    overflow: hidden;
  }
  #app { height: 100%; display: grid; grid-template-rows: auto 1fr; }

  /* Header */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 24px; border-bottom: 0.5px solid #ddd; background: #fff;
  }
  .nav-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #222; text-decoration: none; }
  .nav-logo .suit { color: #1D9E75; }
  .nav-back { font-size: 12px; color: #666; text-decoration: none; }
  .nav-back:hover { color: #222; }

  /* Layout */
  .main { display: grid; grid-template-columns: 320px minmax(0,1fr); min-height: 0; }
  .sidebar { background: #fff; border-right: 0.5px solid #ddd; overflow-y: auto; padding: 14px 0; }
  .stage { padding: 24px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; gap: 18px; }

  /* Sidebar / scenario menu */
  .menu-loading { padding: 14px 16px; font-size: 12px; color: #888; }
  .menu-major { padding: 8px 16px 6px; font-size: 11px; font-weight: 600; color: #856404;
    background: #FFF8DC; letter-spacing: 0.04em; text-transform: uppercase; }
  .menu-section {
    padding: 7px 16px; font-size: 12px; font-weight: 600; color: #1f4d72;
    background: #d9edf7; cursor: pointer; user-select: none;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 0.5px solid #b8dbe9;
  }
  .menu-section:hover { background: #c8e2f0; }
  .menu-section .chevron { font-size: 10px; color: #666; transition: transform 0.15s; }
  .menu-section.open .chevron { transform: rotate(90deg); }
  .menu-items { display: flex; flex-direction: column; }
  .menu-item {
    padding: 6px 16px 6px 26px; font-size: 13px; color: #333; cursor: pointer;
    border-top: 0.5px solid #f0f0f0; line-height: 1.3;
  }
  .menu-item:hover { background: #f5fafd; color: #1D9E75; }
  .menu-item.active { background: #e1f5ee; color: #0f6e56; font-weight: 500; }
  .menu-item.disabled { color: #bbb; cursor: not-allowed; }

  /* Stage states */
  .stage-empty { color: #888; font-size: 14px; padding: 60px 20px; text-align: center; }
  .stage-loading { color: #555; font-size: 14px; padding: 60px 20px; text-align: center; }
  .stage-error { color: #b00; font-size: 13px; padding: 14px 16px; background: #fee; border: 1px solid #fbb;
    border-radius: 6px; max-width: 560px; line-height: 1.5; }

  /* Scenario header */
  .scenario-bar {
    width: 100%; max-width: 720px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: #fff; border: 0.5px solid #ddd; border-radius: 8px;
  }
  .scenario-name { font-size: 15px; font-weight: 500; }
  .scenario-meta { font-size: 12px; color: #666; }
  .scenario-actions { display: flex; gap: 8px; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid #ccc;
    background: #fff; font-size: 13px; cursor: pointer;
  }
  .btn:hover { border-color: #888; }
  .btn-primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .btn-primary:hover { background: #167a5a; border-color: #167a5a; }

  /* Bridge table (compass layout) */
  .table-wrap { display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 24px; align-items: start;
    width: 100%; max-width: 940px; }
  .bridge-table {
    background: #fff; border: 0.5px solid #ddd; border-radius: 10px;
    padding: 18px; display: grid;
    grid-template-columns: 140px 1fr 140px;
    grid-template-rows: auto auto auto;
    gap: 10px; align-items: center; justify-items: center;
  }
  .seat-N { grid-column: 2; grid-row: 1; }
  .seat-W { grid-column: 1; grid-row: 2; }
  .seat-E { grid-column: 3; grid-row: 2; }
  .seat-S { grid-column: 2; grid-row: 3; }
  .center {
    grid-column: 2; grid-row: 2; min-height: 80px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #777; font-size: 11px; gap: 4px;
  }
  .center .vul-tag {
    padding: 2px 8px; border-radius: 4px; background: #f3f3f0; color: #555; font-size: 11px;
  }
  .center .vul-tag.vul { background: #fde2e2; color: #b00; }
  .center .dealer-tag { font-size: 11px; color: #555; }

  .hand {
    background: #fafaf8; border: 0.5px solid #e2e2e0; border-radius: 6px;
    padding: 8px 10px; min-width: 130px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  .hand .seat-label { font-size: 10px; color: #888; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .hand .seat-label.active { color: #1D9E75; }
  .hand-line { display: flex; gap: 4px; line-height: 1.5; white-space: nowrap; }
  .hand-line .suit { width: 14px; display: inline-block; }
  .hand-line .red { color: #d32f2f; }
  .hand-line .black { color: #1a1a1a; }
  .hand-hidden { color: #aaa; font-style: italic; font-family: inherit; }

  /* Auction table + bidding box (right side) */
  .right-rail { display: flex; flex-direction: column; gap: 14px; }
  .auction-card { background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 12px; }
  .auction-card h3 { font-size: 11px; color: #666; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; margin-bottom: 8px; }
  .auction-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .auction-grid .header { font-size: 10px; color: #888; text-align: center; padding: 2px 0; font-weight: 600; }
  .auction-grid .cell {
    padding: 6px 4px; text-align: center; border-radius: 3px; font-size: 13px;
    background: #f8f8f6; min-height: 28px; display: flex; align-items: center; justify-content: center;
  }
  .auction-grid .cell.empty { background: transparent; }
  .auction-grid .cell.current { background: #fff8d4; outline: 1px dashed #d6b400; }
  .auction-grid .cell.wrong { background: #fee; color: #b00; text-decoration: line-through; }
  .auction-grid .cell.ok { background: #e8f7e8; color: #1a4f1a; }
  .red { color: #d32f2f; }

  /* Bidding box */
  .bidding-box { background: #efefec; border-radius: 8px; padding: 12px; display: flex;
    flex-direction: column; gap: 10px; }
  .bb-row { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
  .bb-level, .bb-strain { width: 36px; height: 34px; border-radius: 4px; border: 1.5px solid #ccc;
    background: #fff; cursor: pointer; font-size: 15px; font-weight: 600; }
  .bb-level.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .bb-strain.disabled { opacity: 0.35; cursor: not-allowed; }
  .bb-strain.suit-red { color: #d32f2f; }
  .bb-strain.suit-nt { font-size: 12px; }
  .bb-special { display: flex; gap: 6px; justify-content: center; }
  .bb-special button {
    padding: 6px 12px; border: none; border-radius: 4px; color: #fff; font-weight: 600;
    font-size: 13px; cursor: pointer;
  }
  .bb-special .pass { background: #4caf50; }
  .bb-special .dbl { background: #ff5722; }
  .bb-special .rdbl { background: #2196f3; }
  .bb-special button:disabled { opacity: 0.35; cursor: not-allowed; }

  .feedback {
    padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.4;
  }
  .feedback.ok { background: #e8f7e8; color: #1a4f1a; }
  .feedback.warn { background: #fef3d4; color: #855a00; }

  .contract-box {
    background: #fff; border: 0.5px solid #ddd; border-radius: 10px; padding: 14px 18px;
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    width: 100%; max-width: 720px;
  }
  .contract-line { font-size: 18px; font-weight: 500; }
  .contract-meta { font-size: 13px; color: #666; }

  .toggle-row { display: flex; gap: 12px; font-size: 12px; color: #555; align-items: center; }
  .toggle-row label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .config-bar {
    width: 100%; max-width: 720px; padding: 10px 14px; background: #fffbe6;
    border: 1px solid #f1d97c; border-radius: 8px; font-size: 12px; color: #614b00; line-height: 1.5;
  }
  .config-bar code { background: rgba(0,0,0,0.05); padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>

<div id="app">
  <nav class="nav">
    <a class="nav-logo" href="/"><span class="suit">&spades;</span> Bridge Classroom &middot; Bidding Practice</a>
    <a class="nav-back" href="/">&larr; All tools</a>
  </nav>

  <div class="main">
    <aside class="sidebar">
      <div v-if="menuLoading" class="menu-loading">Loading scenarios&hellip;</div>
      <div v-else-if="menuError" class="menu-loading" style="color:#b00">{{ menuError }}</div>
      <template v-else>
        <template v-for="(node, idx) in menuTree" :key="idx">
          <div v-if="node.type === 'major'" class="menu-major">{{ node.label }}</div>
          <template v-else-if="node.type === 'section'">
            <div class="menu-section" :class="{ open: openSections[node.label] }"
                 @click="toggleSection(node.label)">
              <span>{{ node.label }}</span>
              <span class="chevron">&#9656;</span>
            </div>
            <div v-if="openSections[node.label]" class="menu-items">
              <div v-for="item in node.items" :key="item.file"
                   class="menu-item"
                   :class="{ active: item.file === currentScenario }"
                   @click="selectScenario(item.file)">
                {{ item.label }}
              </div>
            </div>
          </template>
        </template>
      </template>
    </aside>

    <main class="stage">

      <div v-if="!currentScenario && !menuLoading" class="stage-empty">
        Pick a scenario from the menu to start bidding.<br>
        <small>(You sit South. Three BBA bots fill the other seats.)</small>
      </div>

      <div v-if="dealError" class="stage-error">
        <strong>Error:</strong> {{ dealError }}
        <div v-if="dealErrorHint" style="margin-top:6px;font-size:12px">{{ dealErrorHint }}</div>
      </div>

      <template v-if="currentScenario && currentDeal">
        <div class="scenario-bar">
          <div>
            <div class="scenario-name">{{ currentScenarioLabel }}</div>
            <div class="scenario-meta">
              Deal {{ dealIndex + 1 }} of {{ totalDeals }} &middot;
              Dealer {{ currentDeal.dealer }} &middot; Vul {{ currentDeal.vulnerable }}
            </div>
          </div>
          <div class="scenario-actions">
            <button class="btn" @click="newDeal" :disabled="auctionLoading">New deal</button>
            <button class="btn" @click="resetAuction" :disabled="auctionLoading">Restart</button>
          </div>
        </div>

        <div class="table-wrap">
          <div class="bridge-table">
            <div class="seat-N">
              <component :is="auctionComplete ? 'div' : 'div'">
                <hand-display v-if="auctionComplete" :hand="currentDeal.hands.N" seat="N"
                              :active="!auctionComplete && currentSeat === 'N'" />
                <div v-else class="hand">
                  <div class="seat-label" :class="{ active: currentSeat === 'N' }">North</div>
                  <div class="hand-hidden">(hidden)</div>
                </div>
              </component>
            </div>
            <div class="seat-W">
              <hand-display v-if="auctionComplete" :hand="currentDeal.hands.W" seat="W" />
              <div v-else class="hand">
                <div class="seat-label" :class="{ active: currentSeat === 'W' }">West</div>
                <div class="hand-hidden">(hidden)</div>
              </div>
            </div>
            <div class="center">
              <div class="vul-tag" :class="{ vul: vulForSide('NS') || vulForSide('EW') }">
                {{ currentDeal.vulnerable === 'None' ? 'None vul' : currentDeal.vulnerable + ' vul' }}
              </div>
              <div class="dealer-tag">Dealer {{ currentDeal.dealer }}</div>
              <div v-if="auctionLoading" style="font-size:11px;color:#1D9E75">Computing&hellip;</div>
            </div>
            <div class="seat-E">
              <hand-display v-if="auctionComplete" :hand="currentDeal.hands.E" seat="E" />
              <div v-else class="hand">
                <div class="seat-label" :class="{ active: currentSeat === 'E' }">East</div>
                <div class="hand-hidden">(hidden)</div>
              </div>
            </div>
            <div class="seat-S">
              <hand-display :hand="currentDeal.hands.S" seat="S"
                            :active="!auctionComplete && currentSeat === 'S'" />
            </div>
          </div>

          <div class="right-rail">
            <div class="auction-card">
              <h3>Auction</h3>
              <auction-grid :bids="bids" :dealer="currentDeal.dealer"
                            :current-index="bids.length"
                            :wrong-indices="wrongIndices" :show-turn="!auctionComplete" />
            </div>

            <div v-if="!auctionComplete && currentSeat === 'S' && !auctionLoading" class="auction-card">
              <h3>Your bid</h3>
              <bidding-box :last-bid="lastNonPassNonDouble"
                           :can-double="canDouble"
                           :can-redouble="canRedouble"
                           @bid="onUserBid" />
              <div v-if="feedback" class="feedback" :class="feedback.kind" style="margin-top:10px">
                {{ feedback.msg }}
              </div>
            </div>

            <div v-if="auctionComplete" class="contract-box">
              <div class="contract-line">
                Final contract:
                <span v-if="finalContract.contract === 'Pass'">Passed out</span>
                <span v-else>
                  <span v-html="formatContract(finalContract.contract)"></span>
                  by {{ finalContract.declarer }}
                </span>
              </div>
              <div class="contract-meta">{{ summary }}</div>
              <div style="display:flex;gap:8px;margin-top:6px">
                <button class="btn btn-primary" @click="newDeal">Next deal &rarr;</button>
                <button class="btn" @click="resetAuction">Replay this deal</button>
              </div>
            </div>
          </div>
        </div>

        <div v-if="showConfigHint" class="config-bar">
          <strong>First time?</strong> If bot bids never appear, the BBA server may not allow this origin.
          Add <code>https://bridge-classroom.com</code> to the CORS allow-list in
          <code>BBA-CLI/bba-server/Program.cs</code> and restart the server.
        </div>
      </template>

    </main>
  </div>
</div>

<script>
const { createApp, ref, computed, onMounted, reactive, h } = Vue;

// ── Config ──────────────────────────────────────────────────────────
const CONFIG = {
  BBA_URL: 'https://bba.harmonicsystems.com',
  PBS_RAW_BASE: 'https://raw.githubusercontent.com/ADavidBailey/Practice-Bidding-Scenarios/main',
  BUTTON_LAYOUT: '/btn/-button-layout-release.txt',
  PBN_DIR: '/pbn',
};

// ── PBN parsing ─────────────────────────────────────────────────────
// Parse a PBN file containing many [Board "n"] entries. Returns an array of deal objects.
function parsePBN(text) {
  const deals = [];
  const tagRe = /\[(\w+)\s+"([^"]*)"\]/g;
  // Each board is a contiguous block of tags. Split on blank lines.
  const blocks = text.split(/\n\s*\n/);
  for (const block of blocks) {
    const tags = {};
    let m;
    tagRe.lastIndex = 0;
    while ((m = tagRe.exec(block)) !== null) {
      tags[m[1]] = m[2];
    }
    if (!tags.Deal) continue;
    const hands = parseDeal(tags.Deal);
    if (!hands) continue;
    deals.push({
      board: tags.Board || '?',
      dealer: tags.Dealer || 'N',
      vulnerable: tags.Vulnerable || 'None',
      hands,
      pbn: tags.Deal,
    });
  }
  return deals;
}

// "N:S.H.D.C S.H.D.C S.H.D.C S.H.D.C" — clockwise from starting seat
function parseDeal(deal) {
  const m = deal.match(/^([NESW]):(.+)$/);
  if (!m) return null;
  const start = m[1];
  const order = ['N', 'E', 'S', 'W'];
  const startIdx = order.indexOf(start);
  const hands = m[2].trim().split(/\s+/);
  if (hands.length !== 4) return null;
  const result = {};
  for (let i = 0; i < 4; i++) {
    const seat = order[(startIdx + i) % 4];
    const suits = hands[i].split('.');
    if (suits.length !== 4) return null;
    result[seat] = { S: suits[0], H: suits[1], D: suits[2], C: suits[3] };
  }
  return result;
}

// ── Button-layout parsing ───────────────────────────────────────────
// Parse the BBOalert-style layout file into a tree of {majors, sections{items[]}}.
function parseLayout(text) {
  const tree = [];
  const lines = text.split('\n');
  let currentSection = null;
  for (let raw of lines) {
    const line = raw.replace(/\s+$/, '');
    if (!line) continue;
    if (line.startsWith('#')) continue;
    if (line.startsWith('[Major]')) {
      const label = line.substring('[Major]'.length).trim();
      tree.push({ type: 'major', label });
      currentSection = null;
      continue;
    }
    if (line.startsWith('[Section]')) {
      const label = line.substring('[Section]'.length).trim();
      currentSection = { type: 'section', label, items: [] };
      tree.push(currentSection);
      continue;
    }
    if (line.startsWith('[Action]')) continue;       // skip action buttons
    if (!currentSection) continue;                    // ignore items outside a section
    // Item row: "file1, file2" or "file1, ---" or "(grouped:blue, …):width%"
    // For prototype, extract bare file tokens.
    const tokens = extractFileTokens(line);
    for (const tok of tokens) {
      if (tok === '---' || !tok) continue;
      currentSection.items.push({ file: tok, label: prettifyLabel(tok) });
    }
  }
  return tree;
}

function extractFileTokens(line) {
  // Strip color/width modifiers like ":blue", ":12%", parens. Then split on commas.
  // Tokens are simple file basenames like "Smolen", "1m-1N", "Jacoby_2N_4x_void".
  const cleaned = line
    .replace(/\(/g, '')
    .replace(/\)/g, '')
    .replace(/:[a-zA-Z]+/g, '')   // :blue, :red, etc.
    .replace(/:\d+%/g, '');        // :38%
  return cleaned.split(',').map(s => s.trim()).filter(Boolean);
}

function prettifyLabel(file) {
  // file basenames have underscores and dashes; convert to readable label.
  return file
    .replace(/_/g, ' ')
    .replace(/\bGIB\b/g, 'GIB')
    .replace(/\bNT\b/g, 'NT')
    .trim();
}

// ── BBA call ────────────────────────────────────────────────────────
async function generateAuction(deal, scenarioName) {
  // PBN uses "All" but BBA expects "Both"
  const vul = deal.vulnerable === 'All' ? 'Both' : deal.vulnerable;
  const body = {
    deal: {
      pbn: 'N:' + handsToPbn(deal.hands),
      dealer: deal.dealer,
      vulnerability: vul,
      scoring: 'MP',
    },
    scenario: scenarioName,
  };
  const resp = await fetch(CONFIG.BBA_URL + '/api/auction/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    let err = `HTTP ${resp.status}`;
    try { const j = await resp.json(); if (j.error) err = j.error; } catch {}
    throw new Error(err);
  }
  const j = await resp.json();
  if (!j.success) throw new Error(j.error || 'BBA returned success=false');
  return { auction: j.auction, meanings: j.meanings || [] };
}

function handsToPbn(hands) {
  // Always emit in N E S W order so the leading "N:" prefix is correct.
  return ['N', 'E', 'S', 'W'].map(seat => {
    const h = hands[seat];
    return [h.S, h.H, h.D, h.C].join('.');
  }).join(' ');
}

// ── Auction utilities ───────────────────────────────────────────────
const SEAT_ORDER = ['N', 'E', 'S', 'W'];

function nextSeat(seat) {
  return SEAT_ORDER[(SEAT_ORDER.indexOf(seat) + 1) % 4];
}

function seatAtIndex(dealer, index) {
  return SEAT_ORDER[(SEAT_ORDER.indexOf(dealer) + index) % 4];
}

function isAuctionOver(bids) {
  // Three passes after a non-pass bid, OR four passes at the start.
  if (bids.length < 4) return false;
  const last3 = bids.slice(-3);
  if (last3.every(b => b === 'Pass')) {
    // Check there's been a non-pass bid before
    const hasBid = bids.slice(0, -3).some(b => b !== 'Pass');
    if (hasBid) return true;
    if (bids.length === 4 && bids.every(b => b === 'Pass')) return true;
  }
  return false;
}

function lastSuitBid(bids) {
  for (let i = bids.length - 1; i >= 0; i--) {
    if (bids[i] !== 'Pass' && bids[i] !== 'X' && bids[i] !== 'XX') return bids[i];
  }
  return null;
}

function determineContract(bids, dealer) {
  if (!isAuctionOver(bids)) return null;
  if (bids.every(b => b === 'Pass')) return { contract: 'Pass', declarer: null };
  const last = lastSuitBid(bids);
  if (!last) return { contract: 'Pass', declarer: null };
  // Determine doubled/redoubled state from the trailing non-Pass tokens
  let doubled = '';
  for (let i = bids.length - 1; i >= 0; i--) {
    if (bids[i] === 'XX') { doubled = 'XX'; break; }
    if (bids[i] === 'X') { doubled = 'X'; break; }
    if (bids[i] !== 'Pass') break;
  }
  // Declarer: first member of the winning side to bid the strain
  const strain = last.replace(/^\d/, '');
  const lastIdx = bids.lastIndexOf(last);
  const lastSeat = seatAtIndex(dealer, lastIdx);
  const winningSide = (lastSeat === 'N' || lastSeat === 'S') ? ['N', 'S'] : ['E', 'W'];
  for (let i = 0; i < bids.length; i++) {
    const b = bids[i];
    if (b === 'Pass' || b === 'X' || b === 'XX') continue;
    const bStrain = b.replace(/^\d/, '');
    const seat = seatAtIndex(dealer, i);
    if (bStrain === strain && winningSide.includes(seat)) {
      return { contract: last + doubled, declarer: seat };
    }
  }
  return { contract: last + doubled, declarer: lastSeat };
}

// ── Components ──────────────────────────────────────────────────────
const HandDisplay = {
  props: ['hand', 'seat', 'active'],
  template: `
    <div class="hand">
      <div class="seat-label" :class="{ active: active }">{{ seatName }}</div>
      <div class="hand-line"><span class="suit black">&spades;</span><span class="black">{{ hand.S || '—' }}</span></div>
      <div class="hand-line"><span class="suit red">&hearts;</span><span class="red">{{ hand.H || '—' }}</span></div>
      <div class="hand-line"><span class="suit red">&diams;</span><span class="red">{{ hand.D || '—' }}</span></div>
      <div class="hand-line"><span class="suit black">&clubs;</span><span class="black">{{ hand.C || '—' }}</span></div>
    </div>
  `,
  computed: {
    seatName() { return { N: 'North', E: 'East', S: 'South', W: 'West' }[this.seat]; },
  },
};

const BiddingBox = {
  props: ['lastBid', 'canDouble', 'canRedouble'],
  emits: ['bid'],
  data() { return { selectedLevel: 1 }; },
  computed: {
    lastLevel() { return this.lastBid ? parseInt(this.lastBid[0], 10) : 0; },
    lastStrainRank() {
      if (!this.lastBid) return -1;
      const m = this.lastBid.match(/^\d([CDHSN]T?)$/);
      if (!m) return -1;
      return ['C', 'D', 'H', 'S', 'NT'].indexOf(m[1] === 'N' ? 'NT' : m[1]);
    },
    strains() {
      return [
        { value: 'C', display: '♣', red: false, nt: false },
        { value: 'D', display: '♦', red: true,  nt: false },
        { value: 'H', display: '♥', red: true,  nt: false },
        { value: 'S', display: '♠', red: false, nt: false },
        { value: 'N', display: 'NT',     red: false, nt: true  },
      ];
    },
  },
  methods: {
    canBidStrain(strain) {
      const rank = ['C', 'D', 'H', 'S', 'N'].indexOf(strain);
      const ntRank = strain === 'N' ? 4 : rank;
      if (this.selectedLevel > this.lastLevel) return true;
      if (this.selectedLevel === this.lastLevel && ntRank > this.lastStrainRank) return true;
      return false;
    },
    selectLevel(n) { this.selectedLevel = n; },
    pickStrain(s) {
      if (!this.canBidStrain(s)) return;
      this.$emit('bid', `${this.selectedLevel}${s === 'N' ? 'NT' : s}`);
    },
  },
  template: `
    <div class="bidding-box">
      <div class="bb-row">
        <button v-for="n in 7" :key="n" class="bb-level"
                :class="{ active: selectedLevel === n }" @click="selectLevel(n)">{{ n }}</button>
      </div>
      <div class="bb-row">
        <button v-for="s in strains" :key="s.value" class="bb-strain"
                :class="{ disabled: !canBidStrain(s.value), 'suit-red': s.red, 'suit-nt': s.nt }"
                :disabled="!canBidStrain(s.value)"
                @click="pickStrain(s.value)" v-html="s.display"></button>
      </div>
      <div class="bb-special">
        <button class="pass" @click="$emit('bid', 'Pass')">Pass</button>
        <button class="dbl" :disabled="!canDouble" @click="$emit('bid', 'X')">Dbl</button>
        <button class="rdbl" :disabled="!canRedouble" @click="$emit('bid', 'XX')">Redbl</button>
      </div>
    </div>
  `,
};

const AuctionGrid = {
  props: ['bids', 'dealer', 'currentIndex', 'wrongIndices', 'showTurn'],
  computed: {
    rounds() {
      // Display order is W N E S — but auction starts at dealer
      const displayOrder = ['W', 'N', 'E', 'S'];
      const dealerCol = displayOrder.indexOf(this.dealer);
      const result = [];
      let bidIdx = 0;
      let roundNum = 0;
      while (bidIdx < this.bids.length || (roundNum === 0 && bidIdx === 0 && this.bids.length === 0)) {
        const round = [null, null, null, null];
        const start = roundNum === 0 ? dealerCol : 0;
        for (let col = start; col < 4 && bidIdx < this.bids.length; col++) {
          round[col] = { bid: this.bids[bidIdx], idx: bidIdx };
          bidIdx++;
        }
        if (round.some(c => c !== null) || roundNum === 0) result.push(round);
        roundNum++;
        if (roundNum > 25) break;
      }
      // Append a turn-marker cell if appropriate
      if (this.showTurn && this.bids.length === this.currentIndex) {
        const lastRound = result[result.length - 1];
        const colsFilled = lastRound.filter(c => c !== null).length;
        const expectedStart = result.length === 1 ? dealerCol : 0;
        const insertCol = expectedStart + colsFilled;
        if (insertCol < 4) {
          lastRound[insertCol] = { turn: true };
        } else {
          const newRound = [null, null, null, null];
          newRound[0] = { turn: true };
          result.push(newRound);
        }
      }
      return result;
    },
  },
  methods: {
    formatBid(bid) {
      if (!bid) return '';
      if (bid === 'Pass') return '<span style="color:#888">Pass</span>';
      if (bid === 'X') return '<span style="color:#b00;font-weight:600">X</span>';
      if (bid === 'XX') return '<span style="color:#1976d2;font-weight:600">XX</span>';
      const m = bid.match(/^(\d)(.+)$/);
      if (!m) return bid;
      const level = m[1];
      let strain = m[2];
      if (strain === 'NT' || strain === 'N') return level + 'NT';
      const sym = { C: '♣', D: '♦', H: '♥', S: '♠' }[strain];
      const red = strain === 'D' || strain === 'H';
      return `${level}<span class="${red ? 'red' : ''}">${sym}</span>`;
    },
  },
  template: `
    <div>
      <div class="auction-grid">
        <div class="header">W</div><div class="header">N</div>
        <div class="header">E</div><div class="header">S</div>
      </div>
      <div v-for="(round, ri) in rounds" :key="ri" class="auction-grid">
        <div v-for="(c, ci) in round" :key="ci" class="cell"
             :class="{
               empty: !c,
               current: c && c.turn,
               wrong: c && c.idx !== undefined && wrongIndices.includes(c.idx),
             }">
          <span v-if="c && c.bid" v-html="formatBid(c.bid)"></span>
          <span v-else-if="c && c.turn" style="color:#d6b400">?</span>
        </div>
      </div>
    </div>
  `,
};

// ── Main app ────────────────────────────────────────────────────────
const App = {
  components: { HandDisplay, BiddingBox, AuctionGrid },
  setup() {
    const menuTree = ref([]);
    const menuLoading = ref(true);
    const menuError = ref('');
    const openSections = reactive({});

    const currentScenario = ref('');
    const currentScenarioLabel = ref('');
    const dealsForScenario = ref([]);   // all 500 deals
    const dealIndex = ref(0);
    const currentDeal = ref(null);
    const dealError = ref('');
    const dealErrorHint = ref('');

    const expectedAuction = ref([]);    // BBA's full auction
    const bids = ref([]);                // bids placed so far (mix of bot + human)
    const wrongIndices = ref([]);
    const auctionLoading = ref(false);
    const feedback = ref(null);
    const showConfigHint = ref(false);

    const totalDeals = computed(() => dealsForScenario.value.length);
    const auctionComplete = computed(() => currentDeal.value && isAuctionOver(bids.value));
    const currentSeat = computed(() => {
      if (!currentDeal.value) return null;
      return seatAtIndex(currentDeal.value.dealer, bids.value.length);
    });
    const lastNonPassNonDouble = computed(() => lastSuitBid(bids.value));
    const canDouble = computed(() => {
      const last = bids.value[bids.value.length - 1];
      const last2 = bids.value[bids.value.length - 2];
      const last3 = bids.value[bids.value.length - 3];
      // Can double the most recent non-pass bid if it was opponents' suit/NT bid and not already doubled
      const trailing = [];
      for (let i = bids.value.length - 1; i >= 0; i--) {
        if (bids.value[i] === 'Pass') trailing.push('Pass'); else { trailing.push(bids.value[i]); break; }
      }
      const lastNonPass = trailing[trailing.length - 1];
      if (!lastNonPass || lastNonPass === 'Pass') return false;
      if (lastNonPass === 'X' || lastNonPass === 'XX') return false;
      // It must be on the opponent's side: distance from current seat must be 1 or 3
      const lastNonPassPosFromEnd = trailing.length - 1;
      const distFromCurrent = lastNonPassPosFromEnd + 1; // bids since lastNonPass including itself? -> just check parity
      return (distFromCurrent % 2) === 1;
    });
    const canRedouble = computed(() => {
      const trailing = [];
      for (let i = bids.value.length - 1; i >= 0; i--) {
        if (bids.value[i] === 'Pass') trailing.push('Pass'); else { trailing.push(bids.value[i]); break; }
      }
      const lastNonPass = trailing[trailing.length - 1];
      if (lastNonPass !== 'X') return false;
      // Distance from current seat: opponent doubled → odd; partner doubled → even (can't redbl)
      const distFromCurrent = trailing.length;
      return (distFromCurrent % 2) === 1;
    });

    const finalContract = computed(() => {
      if (!currentDeal.value) return { contract: '', declarer: null };
      return determineContract(bids.value, currentDeal.value.dealer) || { contract: '', declarer: null };
    });
    const summary = computed(() => {
      if (!auctionComplete.value) return '';
      if (wrongIndices.value.length === 0) return 'You matched the BBA all the way through.';
      return `${wrongIndices.value.length} of your bids differed from the BBA — see red cells above.`;
    });

    // ── Init ───────────────────────────────────────────────────────
    onMounted(async () => {
      try {
        const resp = await fetch(CONFIG.PBS_RAW_BASE + CONFIG.BUTTON_LAYOUT);
        if (!resp.ok) throw new Error(`Layout HTTP ${resp.status}`);
        const text = await resp.text();
        menuTree.value = parseLayout(text);
        // Open the first section by default
        const firstSection = menuTree.value.find(n => n.type === 'section');
        if (firstSection) openSections[firstSection.label] = true;
      } catch (err) {
        menuError.value = 'Could not load scenario menu: ' + err.message;
      } finally {
        menuLoading.value = false;
      }
    });

    function toggleSection(label) {
      openSections[label] = !openSections[label];
    }

    async function selectScenario(file) {
      if (currentScenario.value === file) return;
      currentScenario.value = file;
      currentScenarioLabel.value = prettifyLabel(file);
      dealError.value = '';
      dealErrorHint.value = '';
      dealsForScenario.value = [];
      currentDeal.value = null;
      try {
        const resp = await fetch(`${CONFIG.PBS_RAW_BASE}${CONFIG.PBN_DIR}/${file}.pbn`);
        if (!resp.ok) throw new Error(`PBN HTTP ${resp.status}`);
        const text = await resp.text();
        const deals = parsePBN(text);
        if (deals.length === 0) throw new Error('No deals in PBN file');
        dealsForScenario.value = deals;
        await loadDealAt(Math.floor(Math.random() * deals.length));
      } catch (err) {
        dealError.value = 'Could not load scenario PBN: ' + err.message;
        dealErrorHint.value = 'Some scenarios in the menu may not have BBA-compatible PBN files.';
      }
    }

    async function loadDealAt(idx) {
      dealError.value = '';
      dealErrorHint.value = '';
      dealIndex.value = idx;
      currentDeal.value = dealsForScenario.value[idx];
      bids.value = [];
      wrongIndices.value = [];
      expectedAuction.value = [];
      feedback.value = null;
      auctionLoading.value = true;
      try {
        const result = await generateAuction(currentDeal.value, currentScenario.value);
        expectedAuction.value = result.auction;
        await playToHumanTurn();
      } catch (err) {
        dealError.value = 'BBA error: ' + err.message;
        if (err.message.includes('Failed to fetch') || err.message.includes('CORS')) {
          dealErrorHint.value =
            'Likely a CORS issue — the BBA server must allow https://bridge-classroom.com.';
          showConfigHint.value = true;
        }
      } finally {
        auctionLoading.value = false;
      }
    }

    async function newDeal() {
      if (dealsForScenario.value.length === 0) return;
      const next = Math.floor(Math.random() * dealsForScenario.value.length);
      await loadDealAt(next);
    }

    async function resetAuction() {
      if (!currentDeal.value) return;
      bids.value = [];
      wrongIndices.value = [];
      feedback.value = null;
      // Re-use already-fetched expected auction (no re-fetch needed)
      await playToHumanTurn();
    }

    // Walk the auction forward, playing bot bids until human's turn (or end).
    async function playToHumanTurn() {
      while (!isAuctionOver(bids.value) && bids.value.length < expectedAuction.value.length) {
        const seat = seatAtIndex(currentDeal.value.dealer, bids.value.length);
        if (seat === 'S') break;
        const bid = expectedAuction.value[bids.value.length];
        // Tiny delay per bot bid for visual feedback
        await sleep(300);
        bids.value.push(bid);
      }
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function onUserBid(bid) {
      if (!currentDeal.value) return;
      const expected = expectedAuction.value[bids.value.length];
      const idx = bids.value.length;
      bids.value.push(bid);
      if (expected && bid !== expected) {
        wrongIndices.value.push(idx);
        feedback.value = {
          kind: 'warn',
          msg: `BBA expected ${expected}. Continuing the auction with BBA's choice so you can see the rest.`
        };
        // Replace the user's bid with BBA's expected so the rest of the auction stays consistent
        bids.value.splice(idx, 1, expected);
      } else {
        feedback.value = { kind: 'ok', msg: 'Match!' };
      }
      // Continue to next human turn or auction end
      await playToHumanTurn();
      if (isAuctionOver(bids.value)) feedback.value = null;
    }

    function vulForSide(side) {
      const v = currentDeal.value?.vulnerable || 'None';
      if (v === 'Both' || v === 'All') return true;
      if (v === 'NS' && side === 'NS') return true;
      if (v === 'EW' && side === 'EW') return true;
      return false;
    }

    function formatContract(contract) {
      if (!contract || contract === 'Pass') return 'Pass';
      const m = contract.match(/^(\d)([CDHSN]T?)(X*)$/);
      if (!m) return contract;
      const [_, level, strain, dbl] = m;
      const sym = { C: '♣', D: '♦', H: '♥', S: '♠', NT: 'NT', N: 'NT' }[strain];
      const red = strain === 'D' || strain === 'H';
      return `${level}<span class="${red ? 'red' : ''}">${sym}</span>${dbl}`;
    }

    return {
      menuTree, menuLoading, menuError, openSections, toggleSection,
      currentScenario, currentScenarioLabel, dealsForScenario, dealIndex, totalDeals, currentDeal,
      dealError, dealErrorHint,
      bids, wrongIndices, expectedAuction, auctionLoading, feedback, showConfigHint,
      auctionComplete, currentSeat, lastNonPassNonDouble, canDouble, canRedouble,
      finalContract, summary,
      selectScenario, newDeal, resetAuction, onUserBid, vulForSide, formatContract,
    };
  },
};

createApp(App).mount('#app');
</script>

</body>
</html>
